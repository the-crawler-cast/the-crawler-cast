name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "README.fr.md"
      - "index.md"
      - "index.fr.md"
      - "devlogs/**"
      - "identity.md"
      - "identity.fr.md"
      - "CHANGELOG.md"
      - "CHANGELOG.fr.md"
      - "press/**"
      - "releases/**"
      - "_config.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
